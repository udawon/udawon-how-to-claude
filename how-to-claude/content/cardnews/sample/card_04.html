<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1080px;
  background: #EBF6FD;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  overflow: hidden; position: relative;
}
.deco-circle { position: absolute; border-radius: 50%; background: rgba(27,163,232,0.07); }
.top-bar { position: relative; z-index: 10; padding: 44px 56px 0; display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 14px; height: 14px; border-radius: 50%; background: #1BA3E8; }
.logo-text { font-size: 28px; font-weight: 900; color: #1BA3E8; letter-spacing: -0.5px; }
.card-num { background: white; border: 2px solid #D6EDFA; color: #0D7AC0; font-size: 20px; font-weight: 700; padding: 10px 22px; border-radius: 40px; letter-spacing: 1px; }
.main { position: relative; z-index: 10; padding: 36px 60px 0; }
.point-badge { display: inline-flex; align-items: center; gap: 12px; background: #1BA3E8; color: white; font-size: 22px; font-weight: 700; padding: 12px 26px; border-radius: 40px; margin-bottom: 28px; }
.badge-num { background: white; color: #1BA3E8; font-size: 20px; font-weight: 900; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.card-title { font-size: 58px; font-weight: 900; color: #1A2B3C; line-height: 1.2; letter-spacing: -1.5px; margin-bottom: 32px; }
.card-title .hl { color: #1BA3E8; }
.content-box { background: white; border-radius: 24px; padding: 36px 48px; box-shadow: 0 4px 24px rgba(13,122,192,0.08); }
.compare { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.col { border-radius: 16px; padding: 24px; text-align: center; }
.col-ok { background: #EBF6FD; border: 2px solid #1BA3E8; }
.col-no { background: #FFF0F0; border: 2px solid #FF6B6B; }
.col-icon { font-size: 40px; margin-bottom: 10px; }
.col-label { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.col-label.ok { color: #0D7AC0; }
.col-label.no { color: #E53935; }
.col-text { font-size: 22px; font-weight: 700; color: #1A2B3C; line-height: 1.4; }
.tip-box { background: #EBF6FD; border-left: 5px solid #1BA3E8; border-radius: 0 12px 12px 0; padding: 16px 22px; }
.tip-label { font-size: 18px; font-weight: 700; color: #1BA3E8; margin-bottom: 6px; }
.tip-text { font-size: 22px; font-weight: 700; color: #1A2B3C; line-height: 1.5; }
.bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; background: #1BA3E8; padding: 26px 56px; display: flex; justify-content: space-between; align-items: center; }
.brand { color: white; font-size: 26px; font-weight: 900; }
.slogan { color: rgba(255,255,255,0.8); font-size: 19px; font-weight: 400; }
</style>
</head>
<body>
<div class="deco-circle" style="width:320px;height:320px;top:-60px;right:-50px;"></div>
<div class="deco-circle" style="width:180px;height:180px;bottom:100px;left:-30px;"></div>
<div class="top-bar">
  <div class="logo"><div class="logo-dot"></div><span class="logo-text">약문약답</span></div>
  <div class="card-num">04 · 06</div>
</div>
<div class="main">
  <div class="point-badge"><div class="badge-num">3</div>세 번째 확인사항</div>
  <div class="card-title"><span class="hl">식전 vs 식후</span>,<br>어떻게 먹어야 할까요?</div>
  <div class="content-box">
    <div class="compare">
      <div class="col col-ok">
        <div class="col-icon">🍚</div>
        <div class="col-label ok">식후 복용 (권장)</div>
        <div class="col-text">이부프로펜 계열<br>위장 자극 완화</div>
      </div>
      <div class="col col-no">
        <div class="col-icon">🚫</div>
        <div class="col-label no">공복 복용 (주의)</div>
        <div class="col-text">이부프로펜 계열<br>위장 장애 위험</div>
      </div>
    </div>
    <div class="tip-box">
      <div class="tip-label">💡 약사 TIP</div>
      <div class="tip-text">아세트아미노펜은 공복도 괜찮지만,<br>속 쓰림이 있다면 식후 복용을 권장합니다.</div>
    </div>
  </div>
</div>
<div class="bottom-bar">
  <span class="brand">약문약답</span>
  <span class="slogan">똑똑한 약사의 파트너</span>
</div>
</body>
</html>
