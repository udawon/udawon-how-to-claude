  },
  _listeners: [],

  get(key) {
    return key ? this._state[key] : { ...this._state };
  },

  set(key, value) {
    this._state[key] = value;
    this._notify();
  },

  update(updates) {
    Object.assign(this._state, updates);
    this._notify();
  },

  subscribe(fn) {
    this._listeners.push(fn);
    return () => { this._listeners = this._listeners.filter(l => l !== fn); };
  },

  _notify() {
    this._listeners.forEach(fn => fn(this._state));
  }
};

function generateMockReservations() {
  const names = ['김민수', '이서연', '박지훈', '최유진', '정태호', '강하늘', '윤소희', '한재민', '임수빈', '오현우', '신예린', '장동건'];

  const statuses = ['대기중', '확인됨', '완료', '대기중', '확인됨', '대기중', '완료', '확인됨', '대기중', '대기중', '확인됨', '완료'];

  const today = new Date();
  const reservations = [];

  for (let i = 0; i < 12; i++) {
    const daysOffset = Math.floor(Math.random() * 14) - 3;
    const d = new Date(today);
    d.setDate(d.getDate() + daysOffset);

// MOCK API LAYER
// ============================================================
const API = {
  async getReservations() {
    await delay(400);
    return Store.get('reservations');
  },

  async checkAvailability(date, time, tableId) {
    await delay(300);
    const reservations = Store.get('reservations');
    const conflict = reservations.find(r =>
      r.date === date && r.time === time && r.tableId === tableId && r.status !== '완료'
    );
    return !conflict;
  },

  async getOccupiedTables(date, time) {
    await delay(200);
    const reservations = Store.get('reservations');
    return reservations
      .filter(r => r.date === date && r.time === time && r.status !== '완료')
      .map(r => r.tableId);
  },

  async createReservation(data) {
    await delay(600);
    const id = 'R' + String(Date.now()).slice(-6);
    const table = TABLES.find(t => t.id === data.tableId);
    const reservation = {
      ...data,
      id,
      tableName: table ? table.name : data.tableId,
      status: '대기중',
      createdAt: new Date().toISOString(),
    };
    const reservations = Store.get('reservations');
    reservations.push(reservation);
    Store.set('reservations', [...reservations]);

    // Save to localStorage for "my bookings"
    const my = JSON.parse(localStorage.getItem('myBookings') || '[]');
    my.push(reservation);
    localStorage.setItem('myBookings', JSON.stringify(my));
    Store.set('myBookings', my);

    return reservation;
  },

  async updateReservationStatus(id, status) {
    await delay(400);
    const reservations = Store.get('reservations');
    const idx = reservations.findIndex(r => r.id === id);
    if (idx >= 0) {
      reservations[idx].status = status;
      Store.set('reservations', [...reservations]);

      // Also update localStorage
      const my = JSON.parse(localStorage.getItem('myBookings') || '[]');
      const myIdx = my.findIndex(r => r.id === id);
      if (myIdx >= 0) {
        my[myIdx].status = status;
        localStorage.setItem('myBookings', JSON.stringify(my));
        Store.set('myBookings', my);
      }

      return reservations[idx];
    }
    throw new Error('예약을 찾을 수 없습니다');
  },

  async adminLogin(password) {
    await delay(500);
    if (password === 'admin1234') {
      Store.set('adminLoggedIn', true);
      return true;
    }
    throw new Error('비밀번호가 올바르지 않습니다');
  }
};

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDateKR(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
}

function formatPrice(n) {
  return n.toLocaleString('ko-KR') + '원';
}

function getDayName(dateStr) {
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  return days[new Date(dateStr).getDay()];
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toast-container');
  const colors = {
    success: 'bg-sage-600 text-white',
    error: 'bg-red-600 text-white',
    info: 'bg-coffee-600 text-white',
    warning: 'bg-yellow-500 text-coffee-900',
  };
  const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };

  const toast = document.createElement('div');
  toast.className = `pointer-events-auto ${colors[type]} px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 toast-enter text-sm font-medium`;
  toast.innerHTML = `<span class="text-lg">${icons[type]}</span><span>${message}</span>`;
  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.remove('toast-enter');
    toast.classList.add('toast-exit');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');

// ============================================================
// SPA ROUTER (Hash-based)
// ============================================================
const Router = {
  routes: {},

  register(path, handler) {
    this.routes[path] = handler;
  },

  navigate(path) {
    window.location.hash = path;
  },

  getCurrentPath() {
    return window.location.hash.slice(1) || '/';
  },

  resolve() {
    const path = this.getCurrentPath();
    Store.set('currentRoute', path);

    // Find matching route
    const handler = this.routes[path];
    if (handler) {
      handler();
    } else {
      // 404
      document.getElementById('app').innerHTML = `

function updateNavHighlight() {
  const path = Router.getCurrentPath();
  document.querySelectorAll('.nav-link').forEach(link => {
    const href = link.getAttribute('href')?.replace('#', '');
    if (href === path) {
      link.classList.add('bg-coffee-100', 'text-coffee-800');
    } else {
      link.classList.remove('bg-coffee-100', 'text-coffee-800');
    }
  });
}

function renderCalendar(year, month, selectedDate) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let html = `
    <div class="flex items-center justify-between mb-4">
      <button onclick="changeMonth(-1)" class="p-2 rounded-lg hover:bg-warmgray-100 transition-colors text-warmgray-500">&lt;</button>
      <span class="font-bold text-coffee-800">${year}년 ${monthNames[month]}</span>
      <button onclick="changeMonth(1)" class="p-2 rounded-lg hover:bg-warmgray-100 transition-colors text-warmgray-500">&gt;</button>
    </div>
    <div class="grid grid-cols-7 gap-1 text-center text-xs text-warmgray-400 mb-2">
      <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>
    <div class="grid grid-cols-7 gap-1 text-center">
  `;

  for (let i = 0; i < firstDay; i++) {
    html += '<div></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(year, month, d);
    const dateStr = formatDate(dateObj);
    const isPast = dateObj < today;
    const isToday = dateObj.getTime() === today.getTime();
    const isSelected = selectedDate === dateStr;

    let cls = 'cal-day w-10 h-10 mx-auto flex items-center justify-center rounded-full text-sm font-medium cursor-pointer ';
    if (isPast) {
      cls += 'disabled text-warmgray-300';
    } else if (isSelected) {
      cls += 'selected bg-coffee-600 text-white';
    } else if (isToday) {
      cls += 'bg-coffee-100 text-coffee-700 hover:bg-coffee-200';
    } else {
      cls += 'hover:bg-warmgray-100 text-coffee-800';
    }

    html += `<div class="${cls}" ${isPast ? '' : `onclick="selectDate('${dateStr}')"`}>${d}</div>`;
  }

  html += '</div>';
  return html;
}

function changeMonth(delta) {
  const data = Store.get('bookingData');
  const today = new Date();
  let m = (data._viewMonth ?? today.getMonth()) + delta;
  let y = data._viewYear ?? today.getFullYear();
  if (m < 0) { m = 11; y--; }
  if (m > 11) { m = 0; y++; }
  data._viewMonth = m;
  data._viewYear = y;
  Store.set('bookingData', data);
  document.getElementById('calendar-container').innerHTML = renderCalendar(y, m, data.date);
}

function selectDate(dateStr) {
  const data = Store.get('bookingData');
  data.date = dateStr;
  data.time = null;
  data.tableId = null;
  Store.set('bookingData', data);
  renderBookingStep1();
}

function selectTime(time) {
  const data = Store.get('bookingData');
  data.time = time;
  data.tableId = null;
  Store.set('bookingData', data);

  // Update time slot highlights
  document.querySelectorAll('.time-slot').forEach(btn => {
    btn.className = 'time-slot px-3 py-2 rounded-lg text-sm font-medium transition-all bg-warmgray-50 text-warmgray-600 hover:bg-coffee-100 hover:text-coffee-700';
  });
  event.target.className = 'time-slot px-3 py-2 rounded-lg text-sm font-medium transition-all bg-coffee-600 text-white shadow-md';

  // Enable and refresh floor map
  document.getElementById('table-section').style.opacity = '1';
  document.getElementById('table-section').style.pointerEvents = 'auto';

  // Load occupied tables
  loadFloorMap(data.date, time);
}

async function loadFloorMap(date, time) {
  const mapEl = document.getElementById('floor-map');
  mapEl.innerHTML = '<div class="col-span-4 text-center py-4"><div class="w-8 h-8 border-4 border-coffee-200 border-t-coffee-600 rounded-full spinner mx-auto"></div><p class="text-sm text-warmgray-400 mt-2">좌석 확인 중...</p></div>';

  const occupied = await API.getOccupiedTables(date, time);
  mapEl.innerHTML = renderFloorMap(null, occupied);
}

function renderFloorMap(selectedId, occupied) {
  return TABLES.map(table => {
    const isOccupied = occupied.includes(table.id);
    const isSelected = selectedId === table.id;
    const span = table.span ? `grid-column: span ${table.span}` : '';

    let cls = 'table-seat rounded-xl p-4 border-2 cursor-pointer text-center transition-all ';
    if (isOccupied) {
      cls += 'occupied bg-red-50 border-red-200 text-red-400 cursor-not-allowed';
    } else if (isSelected) {
      cls += 'bg-coffee-500 border-coffee-600 text-white shadow-lg ring-4 ring-coffee-200';
    } else {
      cls += 'bg-sage-50 border-sage-200 text-sage-700 hover:bg-sage-100 hover:border-sage-300';
    }

    return `
      <div class="${cls}" style="${span}" ${isOccupied ? '' : `onclick="selectTable('${table.id}')"`}>
        <div class="font-bold text-lg">${table.name}</div>
        <div class="text-xs mt-1">${table.type}</div>
        <div class="text-xs mt-0.5">${table.seats}인석</div>
        ${isOccupied ? '<div class="text-xs mt-1 font-medium">예약됨</div>' : ''}
      </div>
    `;
  }).join('');
}

function selectTable(tableId) {
  const data = Store.get('bookingData');
  data.tableId = tableId;
  Store.set('bookingData', data);

  // Re-render floor map with selection
  const occupied = Store.get('reservations')
    .filter(r => r.date === data.date && r.time === data.time && r.status !== '완료')
    .map(r => r.tableId);
  document.getElementById('floor-map').innerHTML = renderFloorMap(tableId, occupied);

  // Enable next button
  const btn = document.getElementById('btn-step1-next');
  if (data.date && data.time && data.tableId) {
    btn.disabled = false;
  }
}

function goToStep2() {

    showToast('날짜, 시간, 좌석을 모두 선택해주세요.', 'warning');
    return;
  }
  Store.set('bookingStep', 2);
  updateStepIndicator(2);
  renderBookingStep2();
}

function adjustGuests(delta) {
  const data = Store.get('bookingData');
  const table = TABLES.find(t => t.id === data.tableId);
  const newCount = Math.max(1, Math.min(table.seats, data.guests + delta));
  data.guests = newCount;
  Store.set('bookingData', data);
  document.getElementById('guest-count').textContent = newCount;
}

function backToStep1() {
  saveStep2Data();
  Store.set('bookingStep', 1);
  renderBookingStep1();
}

function saveStep2Data() {
  const data = Store.get('bookingData');
  const nameEl = document.getElementById('booking-name');
  const phoneEl = document.getElementById('booking-phone');
  const noteEl = document.getElementById('booking-note');
  if (nameEl) data.name = nameEl.value;
  if (phoneEl) data.phone = phoneEl.value;
  if (noteEl) data.note = noteEl.value;
  Store.set('bookingData', data);
}

function goToStep3() {
  saveStep2Data();
  const data = Store.get('bookingData');

  if (!data.name.trim()) {
    showToast('이름을 입력해주세요.', 'warning');
    document.getElementById('booking-name').focus();
    return;
  }
  if (!data.phone.trim()) {

    document.getElementById('booking-phone').focus();
    return;
  }

  Store.set('bookingStep', 3);
  renderBookingStep3();
}

async function submitBooking() {
  const data = Store.get('bookingData');

  showLoading('예약을 접수하고 있습니다...');

  try {
    const available = await API.checkAvailability(data.date, data.time, data.tableId);
    if (!available) {
      hideLoading();
      showToast('선택하신 좌석이 이미 예약되었습니다. 다른 좌석을 선택해주세요.', 'error');
      Store.set('bookingStep', 1);
      renderBookingStep1();
      return;
    }

    const reservation = await API.createReservation({
      date: data.date,
      time: data.time,
      tableId: data.tableId,
      name: data.name,
      phone: data.phone,
      guests: data.guests,
      note: data.note,
    });

    hideLoading();
    showToast('예약이 완료되었습니다!', 'success');

    // Show success screen
    document.getElementById('booking-step-content').innerHTML = `
      <div class="max-w-md mx-auto text-center py-8">
        <div class="w-20 h-20 bg-sage-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <span class="text-4xl text-sage-600">✓</span>
        </div>
        <h2 class="text-2xl font-bold text-coffee-800 mb-2">예약이 완료되었습니다!</h2>
        <p class="text-warmgray-500 mb-6">예약번호: <span class="font-mono font-bold text-coffee-700">${reservation.id}</span></p>
        <div class="bg-warmgray-50 rounded-xl p-5 text-sm text-left mb-8 space-y-2">
          <p><span class="text-warmgray-400">상태:</span> <span class="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full text-xs font-medium">대기중</span></p>
          <p><span class="text-warmgray-400">날짜:</span> ${formatDateKR(data.date)} (${getDayName(data.date)})</p>
          <p><span class="text-warmgray-400">시간:</span> ${data.time}</p>
          <p><span class="text-warmgray-400">좌석:</span> ${reservation.tableName}</p>
        </div>
        <div class="flex gap-3 justify-center">
          <a href="#/my-bookings" class="bg-coffee-600 text-white px-6 py-2.5 rounded-xl font-medium hover:bg-coffee-700 transition-colors">내 예약 보기</a>

function renderAdminDashboard() {
  const reservations = Store.get('reservations');
  const today = formatDate(new Date());

  // Stats
  const todayCount = reservations.filter(r => r.date === today).length;

  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  const weekCount = reservations.filter(r => {
    const d = new Date(r.date);
    return d >= weekStart && d <= weekEnd;
  }).length;

  const activeToday = reservations.filter(r => r.date === today && r.status !== '완료');
  const tableUsage = Math.round((activeToday.length / TABLES.length) * 100);

  const pendingCount = reservations.filter(r => r.status === '대기중').length;

  // Filter and sort
  const filter = Store.get('adminFilter');
  const sort = Store.get('adminSort');

  let filtered = [...reservations];
  if (filter.date) {
    filtered = filtered.filter(r => r.date === filter.date);
  }
  if (filter.status) {
    filtered = filtered.filter(r => r.status === filter.status);
  }

  filtered.sort((a, b) => {
    let cmp = 0;
    if (sort.column === 'date') cmp = a.date.localeCompare(b.date) || a.time.localeCompare(b.time);
    else if (sort.column === 'name') cmp = a.name.localeCompare(b.name);
    else if (sort.column === 'status') cmp = a.status.localeCompare(b.status);
    else if (sort.column === 'table') cmp = a.tableName.localeCompare(b.tableName);
    return sort.direction === 'asc' ? cmp : -cmp;
  });

  document.getElementById('app').innerHTML = `
    <div class="max-w-6xl mx-auto px-4 py-8">
      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-2xl font-bold text-coffee-800">관리자 대시보드</h1>
          <p class="text-sm text-warmgray-400 mt-1">오늘: ${formatDateKR(today)} (${getDayName(today)})</p>
        </div>
        <button onclick="adminLogout()" class="text-sm text-warmgray-500 hover:text-coffee-700 transition-colors px-4 py-2 rounded-lg hover:bg-warmgray-100">
          로그아웃
        </button>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-xl p-5 shadow-sm border border-warmgray-100">
          <p class="text-warmgray-400 text-xs mb-1">오늘 예약</p>
          <p class="text-3xl font-bold text-coffee-700">${todayCount}</p>
          <p class="text-xs text-warmgray-400 mt-1">건</p>
        </div>
        <div class="bg-white rounded-xl p-5 shadow-sm border border-warmgray-100">
          <p class="text-warmgray-400 text-xs mb-1">이번 주 예약</p>
          <p class="text-3xl font-bold text-coffee-700">${weekCount}</p>
          <p class="text-xs text-warmgray-400 mt-1">건</p>
        </div>
        <div class="bg-white rounded-xl p-5 shadow-sm border border-warmgray-100">
          <p class="text-warmgray-400 text-xs mb-1">오늘 테이블 이용률</p>
          <p class="text-3xl font-bold text-coffee-700">${tableUsage}%</p>
          <div class="mt-2 h-2 bg-warmgray-100 rounded-full overflow-hidden">
            <div class="h-full bg-coffee-500 rounded-full transition-all" style="width:${tableUsage}%"></div>
          </div>
        </div>
        <div class="bg-white rounded-xl p-5 shadow-sm border border-warmgray-100">
          <p class="text-warmgray-400 text-xs mb-1">대기중 예약</p>
          <p class="text-3xl font-bold ${pendingCount > 0 ? 'text-yellow-600' : 'text-sage-600'}">${pendingCount}</p>
          <p class="text-xs text-warmgray-400 mt-1">건</p>
        </div>
      </div>

      <!-- Filters -->
      <div class="bg-white rounded-xl p-4 shadow-sm border border-warmgray-100 mb-4 flex flex-wrap gap-3 items-center">
        <span class="text-sm font-medium text-coffee-700">필터:</span>
        <input type="date" id="admin-filter-date" value="${filter.date}"
          onchange="updateAdminFilter()"
          class="border border-warmgray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-coffee-300">
        <select id="admin-filter-status" onchange="updateAdminFilter()"
          class="border border-warmgray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-coffee-300">
          <option value="">전체 상태</option>
          <option value="대기중" ${filter.status === '대기중' ? 'selected' : ''}>대기중</option>
          <option value="확인됨" ${filter.status === '확인됨' ? 'selected' : ''}>확인됨</option>
          <option value="완료" ${filter.status === '완료' ? 'selected' : ''}>완료</option>
        </select>
        <button onclick="clearAdminFilters()" class="text-xs text-warmgray-400 hover:text-coffee-600 transition-colors ml-auto">필터 초기화</button>
      </div>

      <!-- Reservation Table -->
      <div class="bg-white rounded-xl shadow-sm border border-warmgray-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-warmgray-50 border-b border-warmgray-100">
                <th class="text-left px-4 py-3 font-semibold text-coffee-700 cursor-pointer hover:bg-warmgray-100 transition-colors" onclick="sortAdmin('date')">
                  날짜/시간 ${sort.column === 'date' ? (sort.direction === 'asc' ? '↑' : '↓') : ''}
                </th>
                <th class="text-left px-4 py-3 font-semibold text-coffee-700 cursor-pointer hover:bg-warmgray-100 transition-colors" onclick="sortAdmin('name')">
                  예약자 ${sort.column === 'name' ? (sort.direction === 'asc' ? '↑' : '↓') : ''}
                </th>
                <th class="text-left px-4 py-3 font-semibold text-coffee-700 cursor-pointer hover:bg-warmgray-100 transition-colors hidden sm:table-cell" onclick="sortAdmin('table')">
                  좌석 ${sort.column === 'table' ? (sort.direction === 'asc' ? '↑' : '↓') : ''}
                </th>
                <th class="text-left px-4 py-3 font-semibold text-coffee-700 hidden md:table-cell">인원</th>
                <th class="text-left px-4 py-3 font-semibold text-coffee-700 cursor-pointer hover:bg-warmgray-100 transition-colors" onclick="sortAdmin('status')">
                  상태 ${sort.column === 'status' ? (sort.direction === 'asc' ? '↑' : '↓') : ''}
                </th>
                <th class="text-left px-4 py-3 font-semibold text-coffee-700">작업</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.length === 0 ? `
                <tr><td colspan="6" class="text-center py-8 text-warmgray-400">예약이 없습니다</td></tr>
              ` : filtered.map(r => {
                const statusColors = {
                  '대기중': 'bg-yellow-100 text-yellow-700',
                  '확인됨': 'bg-sage-100 text-sage-700',
                  '완료': 'bg-warmgray-100 text-warmgray-500',
                };
                return `
                <tr class="border-b border-warmgray-50 hover:bg-cream-50 transition-colors">
                  <td class="px-4 py-3">
                    <p class="font-medium text-coffee-800">${r.date}</p>
                    <p class="text-xs text-warmgray-400">${r.time} · ${getDayName(r.date)}요일</p>
                  </td>
                  <td class="px-4 py-3">
                    <p class="font-medium text-coffee-800">${r.name}</p>
                    <p class="text-xs text-warmgray-400">${r.phone}</p>
                  </td>
                  <td class="px-4 py-3 hidden sm:table-cell">
                    <span class="text-coffee-700">${r.tableName}</span>
                  </td>
                  <td class="px-4 py-3 hidden md:table-cell">${r.guests}명</td>
                  <td class="px-4 py-3">
                    <span class="${statusColors[r.status] || 'bg-warmgray-100 text-warmgray-500'} px-2 py-1 rounded-full text-xs font-medium">${r.status}</span>
                  </td>
                  <td class="px-4 py-3">
                    <div class="flex gap-1">
                      <button onclick="showReservationDetail('${r.id}')" class="text-xs bg-warmgray-100 text-warmgray-600 px-2 py-1 rounded hover:bg-warmgray-200 transition-colors">상세</button>
                      ${r.status === '대기중' ? `<button onclick="updateStatus('${r.id}', '확인됨')" class="text-xs bg-sage-100 text-sage-700 px-2 py-1 rounded hover:bg-sage-200 transition-colors">확인</button>` : ''}
                      ${r.status === '확인됨' ? `<button onclick="updateStatus('${r.id}', '완료')" class="text-xs bg-coffee-100 text-coffee-700 px-2 py-1 rounded hover:bg-coffee-200 transition-colors">완료</button>` : ''}
                    </div>
                  </td>
                </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
        <div class="px-4 py-3 bg-warmgray-50 border-t border-warmgray-100 text-xs text-warmgray-400">
          총 ${filtered.length}건의 예약
        </div>
      </div>
    </div>
  `;
}

function updateAdminFilter() {
  Store.set('adminFilter', {
    date: document.getElementById('admin-filter-date').value,
    status: document.getElementById('admin-filter-status').value,
  });
  renderAdminDashboard();
}

function clearAdminFilters() {
  Store.set('adminFilter', { date: '', status: '' });
  renderAdminDashboard();
}

function sortAdmin(column) {
  const sort = Store.get('adminSort');
  if (sort.column === column) {
    sort.direction = sort.direction === 'asc' ? 'desc' : 'asc';
  } else {
    sort.column = column;
    sort.direction = 'asc';
  }
  Store.set('adminSort', sort);
  renderAdminDashboard();
}

function showReservationDetail(id) {
  const reservation = Store.get('reservations').find(r => r.id === id);
  if (!reservation) return;

  const statusColors = {
    '대기중': 'bg-yellow-100 text-yellow-700',
    '확인됨': 'bg-sage-100 text-sage-700',
    '완료': 'bg-warmgray-100 text-warmgray-500',
  };

  showModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="font-bold text-lg text-coffee-800">예약 상세</h3>
        <button onclick="closeModal()" class="text-warmgray-400 hover:text-coffee-700 text-xl transition-colors">&times;</button>
      </div>

      <div class="space-y-4 text-sm">
        <div class="flex justify-between py-2 border-b border-warmgray-50">
          <span class="text-warmgray-500">예약번호</span>
          <span class="font-mono font-bold text-coffee-700">${reservation.id}</span>
        </div>
        <div class="flex justify-between py-2 border-b border-warmgray-50">
          <span class="text-warmgray-500">상태</span>
          <span class="${statusColors[reservation.status]} px-2 py-0.5 rounded-full text-xs font-medium">${reservation.status}</span>
        </div>
        <div class="flex justify-between py-2 border-b border-warmgray-50">
          <span class="text-warmgray-500">날짜</span>
          <span class="font-medium">${formatDateKR(reservation.date)} (${getDayName(reservation.date)})</span>
        </div>
        <div class="flex justify-between py-2 border-b border-warmgray-50">
          <span class="text-warmgray-500">시간</span>
          <span class="font-medium">${reservation.time}</span>
        </div>
        <div class="flex justify-between py-2 border-b border-warmgray-50">
          <span class="text-warmgray-500">좌석</span>
          <span class="font-medium">${reservation.tableName}</span>
        </div>
        <div class="flex justify-between py-2 border-b border-warmgray-50">
          <span class="text-warmgray-500">예약자</span>
          <span class="font-medium">${reservation.name}</span>
        </div>
        <div class="flex justify-between py-2 border-b border-warmgray-50">
          <span class="text-warmgray-500">연락처</span>
          <span class="font-medium">${reservation.phone}</span>
        </div>
        <div class="flex justify-between py-2 border-b border-warmgray-50">
          <span class="text-warmgray-500">인원</span>
          <span class="font-medium">${reservation.guests}명</span>
        </div>
        ${reservation.note ? `
        <div class="flex justify-between py-2 border-b border-warmgray-50">
          <span class="text-warmgray-500">요청사항</span>
          <span class="font-medium text-right max-w-[200px]">${reservation.note}</span>
        </div>` : ''}
        <div class="flex justify-between py-2">
          <span class="text-warmgray-500">예약 생성일</span>
          <span class="text-warmgray-400 text-xs">${new Date(reservation.createdAt).toLocaleString('ko-KR')}</span>
        </div>
      </div>

      <!-- Status update buttons -->
      <div class="mt-6 pt-4 border-t border-warmgray-100 flex gap-2 justify-end">
        ${reservation.status !== '대기중' ? '' : `
          <button onclick="updateStatus('${reservation.id}', '확인됨');closeModal()" class="bg-sage-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-sage-700 transition-colors">확인 처리</button>
        `}
        ${reservation.status !== '확인됨' ? '' : `
          <button onclick="updateStatus('${reservation.id}', '완료');closeModal()" class="bg-coffee-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-coffee-700 transition-colors">완료 처리</button>
        `}
        <button onclick="closeModal()" class="bg-warmgray-100 text-warmgray-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-warmgray-200 transition-colors">닫기</button>
      </div>
    </div>
  `);
}

async function updateStatus(id, status) {
  showLoading('상태 업데이트 중...');
  try {
    await API.updateReservationStatus(id, status);
    hideLoading();
    showToast(`예약 상태가 "${status}"(으)로 변경되었습니다.`, 'success');
    if (Store.get('adminLoggedIn')) {
      renderAdminDashboard();
    }
  } catch (err) {
    hideLoading();
    showToast(err.message, 'error');
  }
}

function adminLogout() {
  Store.set('adminLoggedIn', false);
  showToast('로그아웃되었습니다.', 'info');
  renderAdminLogin();
}

// ============================================================
// ROUTE REGISTRATION
// ============================================================
Router.register('/', renderHome);
Router.register('/menu', renderMenu);
Router.register('/booking', renderBooking);
Router.register('/my-bookings', renderMyBookings);
Router.register('/contact', renderContact);
Router.register('/admin', () => {
  if (Store.get('adminLoggedIn')) {
    renderAdminDashboard();
  } else {
    renderAdminLogin();
  }
});

// ============================================================
// INITIALIZATION
// ============================================================
(function init() {
  // Load mock reservations
  Store.set('reservations', generateMockReservations());

  // Load saved bookings from localStorage
  const saved = JSON.parse(localStorage.getItem('myBookings') || '[]');
  Store.set('myBookings', saved);

  // Initial route
  if (!window.location.hash) {
    window.location.hash = '#/';
  }
  Router.resolve();
})();
</script>
</body>
</html>
