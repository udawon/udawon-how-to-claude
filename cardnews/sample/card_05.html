<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1080px;
  background: #EBF6FD;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  overflow: hidden; position: relative;
}
.deco-circle { position: absolute; border-radius: 50%; background: rgba(27,163,232,0.07); }
.top-bar { position: relative; z-index: 10; padding: 44px 56px 0; display: flex; justify-content: space-between; align-items: center; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 14px; height: 14px; border-radius: 50%; background: #1BA3E8; }
.logo-text { font-size: 28px; font-weight: 900; color: #1BA3E8; letter-spacing: -0.5px; }
.card-num { background: white; border: 2px solid #D6EDFA; color: #0D7AC0; font-size: 20px; font-weight: 700; padding: 10px 22px; border-radius: 40px; letter-spacing: 1px; }
.main { position: relative; z-index: 10; padding: 36px 60px 0; }
.point-badge { display: inline-flex; align-items: center; gap: 12px; background: #E53935; color: white; font-size: 22px; font-weight: 700; padding: 12px 26px; border-radius: 40px; margin-bottom: 28px; }
.badge-num { background: white; color: #E53935; font-size: 20px; font-weight: 900; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.card-title { font-size: 58px; font-weight: 900; color: #1A2B3C; line-height: 1.2; letter-spacing: -1.5px; margin-bottom: 32px; }
.card-title .hl { color: #E53935; }
.content-box { background: white; border-radius: 24px; padding: 36px 48px; box-shadow: 0 4px 24px rgba(13,122,192,0.08); }
.warn-header { display: flex; align-items: center; gap: 14px; background: #FFF0F0; border-radius: 12px; padding: 18px 22px; margin-bottom: 22px; }
.warn-icon { font-size: 36px; }
.warn-text { font-size: 26px; font-weight: 900; color: #E53935; }
.content-text { font-size: 28px; font-weight: 700; color: #2C4A5A; line-height: 1.65; margin-bottom: 22px; }
.row-list { display: flex; flex-direction: column; gap: 12px; }
.row-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: #FFF8F8; border-radius: 12px; border-left: 4px solid #E53935; }
.row-icon { font-size: 24px; flex-shrink: 0; }
.row-text { font-size: 22px; font-weight: 700; color: #1A2B3C; }
.bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; background: #1BA3E8; padding: 26px 56px; display: flex; justify-content: space-between; align-items: center; }
.brand { color: white; font-size: 26px; font-weight: 900; }
.slogan { color: rgba(255,255,255,0.8); font-size: 19px; font-weight: 400; }
</style>
</head>
<body>
<div class="deco-circle" style="width:340px;height:340px;top:-70px;right:-50px;"></div>
<div class="deco-circle" style="width:190px;height:190px;bottom:100px;left:-40px;"></div>
<div class="top-bar">
  <div class="logo"><div class="logo-dot"></div><span class="logo-text">약문약답</span></div>
  <div class="card-num">05 · 06</div>
</div>
<div class="main">
  <div class="point-badge"><div class="badge-num">4</div>꼭 지켜야 할 주의사항</div>
  <div class="card-title"><span class="hl">음주 중</span> 감기약,<br>절대 안 됩니다</div>
  <div class="content-box">
    <div class="warn-header">
      <div class="warn-icon">🚨</div>
      <div class="warn-text">술 + 감기약 = 위험 조합</div>
    </div>
    <div class="content-text">알코올이 약물 대사를 방해해<br>독성이 크게 높아집니다.</div>
    <div class="row-list">
      <div class="row-item">
        <div class="row-icon">🍺</div>
        <div class="row-text">아세트아미노펜 + 음주 → 간 손상 위험</div>
      </div>
      <div class="row-item">
        <div class="row-icon">😴</div>
        <div class="row-text">항히스타민제 + 음주 → 과도한 졸음</div>
      </div>
      <div class="row-item">
        <div class="row-icon">⏱️</div>
        <div class="row-text">음주 후 최소 24시간 후 복용</div>
      </div>
    </div>
  </div>
</div>
<div class="bottom-bar">
  <span class="brand">약문약답</span>
  <span class="slogan">똑똑한 약사의 파트너</span>
</div>
</body>
</html>
